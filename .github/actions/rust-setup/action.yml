name: "Rust setup"
description: "Installs a Rust toolchain with specified components, targets, and tools, and configures caching."

inputs:
  toolchain:
    description: "Rust toolchain to install: stable, nightly, or an explicit version."
    required: false
    default: stable
  components:
    description: "Comma-separated rustup components (e.g. rust-src, miri). Omit to get the default `rustfmt, clippy`; pass an explicit empty string to install no extra components."
    required: false
    default: "rustfmt, clippy"
  targets:
    description: "Comma-separated cross-compilation targets (e.g. thumbv7em-none-eabihf). Empty installs none."
    required: false
    default: ""
  tools:
    description: "Comma-separated cargo tools to install via taiki-e/install-action (e.g. nextest, cargo-deny). Empty installs none."
    required: false
    default: ""
  workspaces:
    description: "Passed to actions-rust-lang/setup-rust-toolchain as `cache-workspaces`; use when a Cargo workspace is not at the repo root. Each entry is `path` (target dir defaults to `target`) or `path -> custom-target` for a non-default target dir; e.g. `fuzz`."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Rust toolchain
      uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1.16.1
      with:
        toolchain: ${{ inputs.toolchain }}
        components: ${{ inputs.components }}
        target: ${{ inputs.targets }}
        cache-all-crates: true
        cache-workspaces: ${{ inputs.workspaces }}

    - name: Install cargo tools
      if: inputs.tools != ''
      uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
      with:
        tool: ${{ inputs.tools }}

    # generate lockfile if not committed yet
    - name: Ensure Cargo.lock
      shell: bash
      run: test -f Cargo.lock || cargo generate-lockfile

    - name: Set env
      shell: bash
      run: |
        echo "CARGO_TERM_COLOR=always" >> $GITHUB_ENV
