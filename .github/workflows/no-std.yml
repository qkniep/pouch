name: no_std

# Checks that the crate builds without `std` on a bare-metal target, and that
# the binary-size probe (`size/`) still runs.

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: no-std-${{ github.ref }}
  cancel-in-progress: true

jobs:
  no-std:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/rust-setup
        with:
          # Build-only check on a bare-metal target; rustfmt/clippy aren't needed.
          components: ""
          targets: thumbv7em-none-eabihf

      # Trait scaffolding only — no backend is enabled here, so this on its own
      # doesn't exercise any backend's no_std-ness.
      - name: Build core (no backends)
        run: cargo build --no-default-features --target thumbv7em-none-eabihf --locked

      # The actual point of this workflow: compile the backends on bare metal. A
      # `std::` reach inside e.g. backend/heapless.rs builds fine on the std host
      # (feature-powerset, rust.yml) but breaks here — this is the job that catches it.
      - name: Build alloc-free backends (arrayvec, heapless)
        run: cargo build --no-default-features --features arrayvec,heapless --target thumbv7em-none-eabihf --locked

      # The alloc-but-no-std path for the growable inline backends: `alloc` is
      # available on this target, but `std` is not.
      - name: Build alloc backends without std (smallvec, tinyvec)
        run: cargo build --no-default-features --features alloc,smallvec,tinyvec --target thumbv7em-none-eabihf --locked

  # Drift guard for the binary-size probe: `size/` is a standalone crate that
  # names the public API directly (it once rotted silently on a type rename +
  # a heapless major bump, masked by its own stale lockfile). Pass/fail is
  # "the script builds every variant and completes"; the byte counts it prints
  # are informational only — size is probe-defined and toolchain-volatile, so
  # a numeric threshold would flap (see size/README.md).
  size-harness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The job runs third-party build scripts via cargo; don't leave the
          # (read-only) token in .git/config for them to read.
          persist-credentials: false
      - uses: ./.github/actions/rust-setup
        with:
          # llvm-tools provides the llvm-nm the symbol diff needs.
          components: llvm-tools
          targets: thumbv7em-none-eabihf
          # `size/` is its own workspace root; cache its target dir, not the repo's.
          workspaces: size

      - name: Run the binary-size probe
        run: bash size/measure.sh
