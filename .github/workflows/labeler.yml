name: Labeler

# Syncs the repo's labels to .github/labels.yml so the label set is declarative
# and version-controlled. Pushes to main apply the set; PRs that touch the file
# get a dry-run preview in the job logs.

permissions:
  contents: read

on:
  push:
    branches: ["main"]
    paths: [".github/labels.yml"]
  pull_request:
    paths: [".github/labels.yml"]
  workflow_dispatch:

# Serialize every mutating run against the repo-wide label set, which is a
# single global resource. A ref-scoped group would let a workflow_dispatch from
# a feature branch race a push to main (both apply changes — dry-run is only on
# for pull_request), so the group is a fixed string, not keyed on github.ref.
# cancel-in-progress stays false: queue runs rather than interrupt a sync.
concurrency:
  group: labeler
  cancel-in-progress: false

jobs:
  labeler:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read # checkout (overrides workflow-level permissions, so repeat here)
      issues: write # create/update/delete labels
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false # only reads labels.yml; the action auths via its token input

      - name: Sync labels
        uses: crazy-max/ghaction-github-labeler@548a7c3603594ec17c819e1239f281a3b801ab4d # v6.0.0
        with:
          yaml-file: .github/labels.yml
          # Only real syncs from main apply the set (deleting any labels not
          # listed above); PRs and manual dispatches from other branches stay a
          # dry-run preview in the logs, so a stray branch can't rewrite labels.
          dry-run: ${{ github.event_name == 'pull_request' || github.ref != 'refs/heads/main' }}
          # Set "skip-delete: true" to sync add-only, without pruning.
